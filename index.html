<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibration Logger Pro v3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; border: 1px solid #333; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; flex: 1; min-width: 120px; transition: 0.2s; }
        #startBtn { background: #2ecc71; color: white; }
        #stopBtn { background: #f39c12; color: white; display: none; }
        #exportBtn { background: #3498db; color: white; display: none; }
        #resetBtn { background: #e74c3c; color: white; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; text-align: center; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.1rem; font-family: monospace; color: #eee; padding-top: 5px; }
        canvas { background: #000; border-radius: 8px; margin-top: 10px; }
        .log-count { font-size: 0.75rem; color: #3498db; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Vibration Data Logger</h2>
    
    <div class="controls">
        <button id="startBtn">START RECORDING</button>
        <button id="stopBtn">STOP & PAUSE</button>
        <button id="exportBtn">DOWNLOAD CSV</button>
        <button id="resetBtn">RESET ALL</button>
    </div>

    <div class="stats">
        <div><div class="label">X-Axis</div><div id="valX" class="value">0.00</div></div>
        <div><div class="label">Y-Axis</div><div id="valY" class="value">0.00</div></div>
        <div><div class="label">Z-Axis</div><div id="valZ" class="value">0.00</div></div>
    </div>

    <canvas id="vibrationChart"></canvas>
    <div id="logCount" class="log-count">Data Points Captured: 0</div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resetBtn = document.getElementById('resetBtn');
    const logCountDisp = document.getElementById('logCount');
    
    const valXDisp = document.getElementById('valX');
    const valYDisp = document.getElementById('valY');
    const valZDisp = document.getElementById('valZ');

    const ctx = document.getElementById('vibrationChart').getContext('2d');

    let chart;
    let isRecording = false;
    let recordingBuffer = []; 
    const historyLimit = 100; 
    
    let visualX = Array(historyLimit).fill(0);
    let visualY = Array(historyLimit).fill(0);
    let visualZ = Array(historyLimit).fill(0);

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(historyLimit).fill(''),
            datasets: [
                { label: 'X', data: visualX, borderColor: '#ff6384', borderWidth: 2, pointRadius: 0, fill: false },
                { label: 'Y', data: visualY, borderColor: '#4bc0c0', borderWidth: 2, pointRadius: 0, fill: false },
                { label: 'Z', data: visualZ, borderColor: '#36a2eb', borderWidth: 2, pointRadius: 0, fill: false }
            ]
        },
        options: {
            responsive: true,
            animation: false,
            scales: { 
                y: { min: -15, max: 15, grid: { color: '#333' }, ticks: { color: '#666' } }, 
                x: { display: false } 
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });

    startBtn.onclick = async () => {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== 'granted') return;
        }
        
        isRecording = true;
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        exportBtn.style.display = 'none';
        window.addEventListener('devicemotion', handleMotion);
    };

    function handleMotion(event) {
        if (!isRecording) return;

        const acc = event.acceleration;
        if (!acc || acc.x === null) return;

        const timestamp = new Date().toISOString();
        
        // Update Export Buffer
        recordingBuffer.push({
            time: timestamp,
            x: acc.x.toFixed(4),
            y: acc.y.toFixed(4),
            z: acc.z.toFixed(4)
        });

        // Update UI Stats Text
        valXDisp.innerText = acc.x.toFixed(2);
        valYDisp.innerText = acc.y.toFixed(2);
        valZDisp.innerText = acc.z.toFixed(2);
        logCountDisp.innerText = `Data Points Captured: ${recordingBuffer.length}`;

        // Update Visual Graph
        visualX.push(acc.x); visualX.shift();
        visualY.push(acc.y); visualY.shift();
        visualZ.push(acc.z); visualZ.shift();
        chart.update();
    }

    stopBtn.onclick = () => {
        isRecording = false;
        stopBtn.style.display = 'none';
        startBtn.innerText = "RESUME";
        startBtn.style.display = 'inline-block';
        if (recordingBuffer.length > 0) exportBtn.style.display = 'inline-block';
    };

    exportBtn.onclick = () => {
        let csvContent = "Timestamp,X_Axis(m/s2),Y_Axis(m/s2),Z_Axis(m/s2)\n";
        recordingBuffer.forEach(row => {
            csvContent += `${row.time},${row.x},${row.y},${row.z}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `vib_data_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    resetBtn.onclick = () => {
        if(confirm("Are you sure you want to clear all data and reset sensors to zero?")) {
            // 1. Clear Data Storage
            recordingBuffer = [];
            
            // 2. Clear Graph
            visualX.fill(0); visualY.fill(0); visualZ.fill(0);
            chart.update();
            
            // 3. Reset Numerical Displays to 0 (Fixes your issue)
            valXDisp.innerText = "0.00";
            valYDisp.innerText = "0.00";
            valZDisp.innerText = "0.00";
            
            // 4. Reset UI State
            logCountDisp.innerText = "Data Points Captured: 0";
            exportBtn.style.display = 'none';
            stopBtn.style.display = 'none';
            startBtn.innerText = "START RECORDING";
            startBtn.style.display = 'inline-block';
            
            isRecording = false;
        }
    };
</script>
</body>
</html>
